# Voxtral adapter configuration.
# Declares the model only; no eager download happens at config load time. Real
# weights are fetched lazily on the first generate_text call (manual/Colab/GPU).
adapter_id: voxtral
model_family: voxtral
model_name: mistralai/Voxtral-Mini-3B-2507
inference_profile: base
eager_download: false
runtime:
  requires_gpu: true
  approximate_memory_gb: 12
  notes: "Audio+text model; run manually in Colab or on a GPU runner."
capabilities:
  supports_text_input: true
  supports_audio_input: true
  supports_transcript_output: true
  supports_tool_call_output: true
  supports_lora: false
  supports_quantization: true
  supported_pipelines: [A, C, D]
generation:
  max_new_tokens: 512
  do_sample: false
