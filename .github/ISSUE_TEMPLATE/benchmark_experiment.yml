name: Benchmark Experiment
description: Record a benchmark hypothesis, setup, metrics, and result.
title: "[Experiment]: "
labels: ["benchmark"]
body:
  - type: textarea
    id: hypothesis
    attributes:
      label: Hypothesis
    validations:
      required: true
  - type: input
    id: pipeline
    attributes:
      label: Pipeline
      description: A, B, C, D, or comparison group.
    validations:
      required: true
  - type: textarea
    id: setup
    attributes:
      label: Setup
    validations:
      required: true
  - type: textarea
    id: metrics
    attributes:
      label: Metrics
    validations:
      required: true
  - type: textarea
    id: result
    attributes:
      label: Result
    validations:
      required: true
