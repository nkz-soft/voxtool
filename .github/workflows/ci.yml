name: CI

# CI RESOURCE BOUNDARY (advanced benchmark phases):
#   Ordinary CI MUST stay lightweight. Do NOT add steps that download real
#   models, pull Hugging Face checkpoints, run LoRA/SFT training, synthesize
#   speech, or require a GPU. The optional dependency groups
#   (notebook/model/finetuning/speech/quantization) MUST NOT be installed here.
#   `make install` installs only the base + dev groups by design.
#   Real-model, GPU, fine-tuning, speech, and quantized runs are MANUAL and live
#   in `.github/workflows/gpu-benchmarks.yml` (workflow_dispatch only).
#   All model behavior in CI is mock-backed via MockModelAdapter and fixtures.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version
      - name: Install dependencies
        # Lightweight install only (base + dev). No real-model / GPU / speech
        # extras. See the CI RESOURCE BOUNDARY note at the top of this file.
        run: make install
      - name: Ruff check
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .
      - name: Mypy
        run: uv run mypy
      - name: Run tests with pytest and coverage
        run: uv run pytest --junitxml=pytest.xml
        env:
          PYTHONPATH: .
      - name: Mock smoke benchmark
        run: make benchmark-smoke
      - name: Publish coverage summary to PR
        if: ${{ github.event_name == 'pull_request' }}
        uses: MishaKav/pytest-coverage-comment@v1
        with:
          pytest-xml-coverage-path: ./coverage.xml
          junitxml-path: ./pytest.xml
      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 14
