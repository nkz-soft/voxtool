name: Benchmark Smoke

on:
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version
      - name: Install dependencies
        run: make install
      - name: Run MockModelAdapter smoke benchmark
        run: make benchmark-smoke
      - name: Upload smoke artifacts
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-smoke
          path: reports/smoke
          retention-days: 14
      - name: Upload smoke metrics
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-smoke-metrics
          path: |
            reports/smoke/metrics-summary.csv
            reports/smoke/report.md
          retention-days: 14
